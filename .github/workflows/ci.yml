name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # All dummy/CI-only values — config.settings_test uses SQLite +
      # in-memory cache + eager Celery + locmem email, so none of these
      # ever touch a real service. Mirrors what's already proven to work
      # locally and in the project's Docker environment:
      #   DJANGO_SETTINGS_MODULE=config.settings_test pytest
      DJANGO_SETTINGS_MODULE: config.settings_test
      SECRET_KEY: ci-dummy-secret-key-not-for-production-use
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: ci_dummy
      DB_USER: ci_dummy
      DB_PASSWORD: ci_dummy
      DB_HOST: localhost
      DB_PORT: "5432"
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: "587"
      EMAIL_USE_TLS: "True"
      EMAIL_HOST_USER: ci@example.com
      EMAIL_HOST_PASSWORD: ci-dummy-password
      DEFAULT_FROM_EMAIL: ci@example.com
      GOOGLE_OAUTH2_CLIENT_ID: ci-dummy-client-id
      GOOGLE_OAUTH2_CLIENT_SECRET: ci-dummy-client-secret
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check

      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run test suite
        run: pytest -v

  lint:
    runs-on: ubuntu-latest
    # Advisory only — surfaces feedback without blocking merges on
    # pre-existing style issues across the whole codebase.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff==0.14.5

      - name: Run ruff
        run: ruff check .
